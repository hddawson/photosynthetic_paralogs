# Configuration for one gene scanned across the HiFi angiosperm genomes.
# Run the pipeline for this gene with:  --gene rbcS
#
# Required:
#   name        : must match this file's basename (rbcS -> rbcS.toml)
#   ONE query source:
#       uniprot_id   : UniProt accession, downloaded from UniProt at runtime
#       query_fasta  : OR a path (relative to repo root) to a reference FASTA
#
# Everything below the query source is optional; the values shown are the
# defaults from code/genepipe.py and can be deleted if you don't change them.

name = "rbcS"

# rbcS (Rubisco small subunit) from Nicotiana tabacum, 180 aa incl. transit peptide.
uniprot_id = "P69249"
# query_fasta = "refs/rbcS.faa"   # use instead of uniprot_id

# --- scan_genomes.py ---
min_query_coverage = 0.3   # keep hits covering >= this fraction of the query
flank_nt = 500             # genomic context kept on each side of a locus
miniprot_outs = 0.9        # report hits scoring >= this fraction of the best

# --- filter_tiberius.py ---
min_peptide_length_aa = 80 # drop Tiberius peptides shorter than this
